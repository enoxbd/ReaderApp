name: Release Obfuscation Build

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build:
    name: Build Release (R8 obfuscation)
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.home }}/Android/Sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android commandline tools and SDK packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fSL -o /tmp/cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv -f "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Show Gradle and Java
        run: |
          gradle -v || true
          java -version || true

      - name: Build release APK (R8 enabled)
        run: |
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$PATH"
          # Use Gradle CLI on runner; make sure debug keystore is available in repo root
          gradle :app:assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx6g -Dfile.encoding=UTF-8"
        env:
          JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload mapping file
        uses: actions/upload-artifact@v4
        with:
          name: mapping-release
          path: app/build/outputs/mapping/release
